<section>
  <h2>Tag Search</h2>
  <p>タグ名で絞り込みできます。</p>
  <input
    id="tag-search"
    type="search"
    placeholder="例: haskell"
    autocomplete="off"
  />
  <ul id="tag-search-results" class="tag-search-results">
    $tagcloud$
  </ul>
  <p id="tag-search-empty" class="muted" hidden>一致するタグはありません。</p>
</section>
<script defer src="/js/tag-search.js"></script>
